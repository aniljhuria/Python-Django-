{% extends 'base.html' %}

{% block content %}



{% include 'dashboard/sidebar.html' %}


     <!--right side baar-->
    <div class="col-md-9">
        
        <div class="table-responsive">
            <h3>All Categories
            <a href="{% url 'add_category' %}" class="btn btn-dark text-light float-right mb-2">Add New</a>
            </h3>
            <table class="table table-hover table-bordered">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Category Name</th>
                        <th>Created At</th>
                        <th>Updated At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ cat }}</td>
                        <td>{{ cat.created_at }}</td>
                        <td>{{ cat.updated_at }}</td>
                        <td>
                            <a href="{% url 'edit_category' cat.id %}"><i class="fa fa-edit text-success"></i></a>&nbsp;
                            <a href="{% url 'delete_category' cat.id %}"><i class="fa fa-trash text-danger"></i></a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>


{% endblock  %}
