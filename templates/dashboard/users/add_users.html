{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}


{% include 'dashboard/sidebar.html' %}


     <!--right side baar-->
    <div class="col-md-9">
         {% if perms.auth.add_user %}
        <div class="row">
            <div class="col-12">
                <h3>Add New User</h3>                
                    <form action="{% url 'add_users' %}" method="POST">
                        {% csrf_token %}
                        {{ form |crispy }}
                         <!-- {% crispy form %} -->

                          <button type="submit" class="btn btn-warning mt-1" >Submit</button>
                    </form>
            </div>            
        </div>
        {% else %}
        <h5>you do not have permission to view this page </h5>
        {% endif %}
        
        <br>

    </div>
</div>


{% endblock  %}
